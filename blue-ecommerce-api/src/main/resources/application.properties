spring.application.name=Blue Ecommerce Platform
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce
spring.datasource.username=ecommerce
spring.datasource.password=123456

# Configuração do JPA/Hibernate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.sql.init.mode=always


logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=TRACE
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

server.port=8081


spring.security.secret.key=ecommerce2025
spring.security.token.issuer=usuarios-apijpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true



#Habilita o endpoint do Prometheus
management.endpoint.prometheus.enabled=true
# Expõe os endpoints do Actuator, incluindo o prometheus

management.endpoints.web.exposure.include=prometheus,health,info,metrics

#Adiciona tags para identificar a aplicação
#menagemente.metrics.tags.application=${spring.application.name}
#management.metrics.tags.enviroment=local


#Habilita histogramas para calcular percentis (ex p95 , p99)
management.metrics.distribution.percentiles-histogram.http.server.requests=true

